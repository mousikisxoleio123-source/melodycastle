<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Melody Castle - Final Wall</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #000; overflow: hidden;
        }

        #wall-container {
            position: relative;
            width: 85vw;
            aspect-ratio: 16 / 9;
            background-image: url('photos/walllink.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: background-image 0.3s ease-in-out;
        }

        /* Το Animation για τη ΜΟΝΑΔΙΚΗ κίνηση αντίδρασης */
        @keyframes react {
            0% { transform: translate(var(--x), var(--y)) scale(1) rotate(0deg); }
            50% { transform: translate(calc(var(--x) + 2px), calc(var(--y) - 2px)) scale(1.05) rotate(1.5deg); }
            100% { transform: translate(var(--x), var(--y)) scale(1) rotate(0deg); }
        }

        .instrument-link {
            position: absolute;
            display: block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            transform: translate(var(--x), var(--y));
            transition: filter 0.2s;
        }

        .instrument-link:hover {
            z-index: 15;
            filter: brightness(1.2) drop-shadow(0 0 5px gold);
            animation: react 0.2s ease-out 1;
        }

        #main-lever {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translate(var(--x), var(--y));
        }
    </style>
</head>
<body>

    <div id="wall-container">
        <div id="main-lever" onclick="toggleLights()"></div>
    </div>

    <script>

          { "id": "English horn.png", "width": "209px", "height": "202px", "x": 551, "y": 123, "top": "35%", "left": "2%" },
          { "id": "fagotto.png", "width": "166px", "height": "195px", "x": 98, "y": 119, "top": "35%", "left": "12%" },
          { "id": "flute.png", "width": "233px", "height": "220px", "x": 865, "y": -294, "top": "35%", "left": "22%" },
          { "id": "GranCasa.png", "width": "183px", "height": "162px", "x": 408, "y": 558, "top": "35%", "left": "32%" },
          { "id": "Guitar.png", "width": "158px", "height": "170px", "x": -816, "y": 531, "top": "35%", "left": "42%" },
          { "id": "Harp.png", "width": "205px", "height": "212px", "x": 1050, "y": -468, "top": "50%", "left": "2%" },
          { "id": "Horn.png", "width": "164px", "height": "165px", "x": 1363, "y": -30, "top": "50%", "left": "12%" },
          { "id": "oboe.png", "width": "219px", "height": "203px", "x": -410, "y": -59, "top": "50%", "left": "22%" },

          { "id": "Timpani.png", "width": "148px", "height": "136px", "x": 603, "y": 210, "top": "65%", "left": "12%" },
          { "id": "Trombone.png", "width": "147px", "height": "154px", "x": 645, "y": -199, "top": "65%", "left": "22%" },
          { "id": "Trumpet.png", "width": "159px", "height": "168px", "x": 168, "y": -222, "top": "65%", "left": "32%" },
          { "id": "tuba.png", "width": "134px", "height": "181px", "x": 476, "y": -232, "top": "65%", "left": "42%" },
          { "id": "vibraphone.png", "width": "149px", "height": "160px", "x": 322, "y": 42, "top": "80%", "left": "2%" },
          { "id": "viola.png", "width": "152px", "height": "190px", "x": 123, "y": -841, "top": "80%", "left": "12%" },
          { "id": "violin.png", "width": "156px", "height": "182px", "x": -361, "y": -836, "top": "80%", "left": "22%" },
          { "id": "Xylophone.png", "width": "167px", "height": "156px", "x": -76, "y": 41, "top": "80%", "left": "32%" }
        ];

        let lightsOn = false;
        const container = document.getElementById('wall-container');
        const lever = document.getElementById('main-lever');
        
        const leverPos = { width: "170px", height: "199px", x: 1988, y: 266, top: "5%", left: "2%" };

        function initApp() {
            lever.style.width = leverPos.width;
            lever.style.height = leverPos.height;
            lever.style.top = leverPos.top;
            lever.style.left = leverPos.left;
            lever.style.setProperty('--x', `${leverPos.x}px`);
            lever.style.setProperty('--y', `${leverPos.y}px`);
            lever.style.backgroundImage = "url('photos/leviesdown.png')";

            config.forEach(item => {
                const a = document.createElement('a');
                a.className = 'instrument-link';
                
                // Επιλογή link από το customLinks
                const targetLink = customLinks[item.id] || item.id.replace('.png', '.html');
                a.href = targetLink;
                
                a.style.width = item.width;
                a.style.height = item.height;
                a.style.top = item.top;
                a.style.left = item.left;
                a.style.setProperty('--x', `${item.x}px`);
                a.style.setProperty('--y', `${item.y}px`);
                
                const imageUrl = encodeURI(`photos/${item.id}`);
                a.style.backgroundImage = `url('${imageUrl}')`;
                container.appendChild(a);
            });
        }

        function toggleLights() {
            if (!lightsOn) {
                container.style.backgroundImage = "url('photos/walllink1.png')";
                lever.style.backgroundImage = "url('photos/leviesup.png')";
                lightsOn = true;
            } else {
                container.style.backgroundImage = "url('photos/walllink.png')";
                lever.style.backgroundImage = "url('photos/leviesdown.png')";
                lightsOn = false;
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
